<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ブロックゲーム</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #16161e;
            --accent: #00f2ff;
            --btn-bg: #252530;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* メインレイアウト */
        .game-root {
            position: relative;
            display: flex;
            gap: 15px;
            padding: 15px;
            background: var(--panel);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            border: 1px solid #333;
        }

        canvas {
            display: block;
            background: #000;
            border-radius: 5px;
        }

        #tetris {
            border: 2px solid #444;
        }

        /* 右側UI */
        .ui-side {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90px;
        }

        .box {
            background: #000;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px;
            text-align: center;
        }

        .label { font-size: 10px; color: #888; margin-bottom: 4px; font-weight: bold; }
        .value { font-size: 18px; font-weight: bold; color: var(--accent); }

        #next-canvas {
            margin-top: 5px;
        }

        .cmd-btn {
            border: none;
            border-radius: 8px;
            padding: 12px 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            background: var(--btn-bg);
            color: white;
        }

        #start-btn { background: var(--accent); color: #000; }

        /* オーバーレイ */
        #msg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 20px;
        }

        /* 操作パネル */
        .controls {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .pad { display: grid; gap: 10px; }
        .move-pad { grid-template-columns: repeat(3, 65px); }
        .action-pad { grid-template-columns: repeat(2, 65px); }

        .btn {
            height: 65px;
            background: var(--btn-bg);
            border: 1px solid #444;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            user-select: none;
            box-shadow: 0 4px 0 #000;
        }

        .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #000; background: #333; }
        .btn-rot { border-color: var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <div class="game-root">
        <div id="msg-overlay">
            <h2 id="msg-text" style="color:red; margin:0;">GAME OVER</h2>
            <p id="final-score" style="margin:10px 0;">Score: 0</p>
            <button class="cmd-btn" onclick="initGame()" style="width:100px; background:#fff; color:#000;">RETRY</button>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="ui-side">
            <div class="box">
                <div class="label">SCORE</div>
                <div id="score-val" class="value">0</div>
            </div>
            <div class="box">
                <div class="label">NEXT</div>
                <canvas id="next-canvas" width="70" height="70"></canvas>
            </div>
            <button id="start-btn" class="cmd-btn" onclick="initGame()">START</button>
            <button id="pause-btn" class="cmd-btn" onclick="pauseGame()">PAUSE</button>
        </div>
    </div>

    <div class="controls">
        <div class="pad move-pad">
            <div class="btn" id="m-left" style="grid-column:1">←</div>
            <div class="btn" id="m-down" style="grid-column:2">↓</div>
            <div class="btn" id="m-right" style="grid-column:3">→</div>
        </div>
        <div class="pad action-pad">
            <div class="btn btn-rot" id="m-rot">↻</div>
            <div class="btn" id="m-drop" style="font-size:12px; font-weight:bold; color:#ff4d4d;">DROP</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const ctx = canvas.getContext('2d');
        const nCanvas = document.getElementById('next-canvas');
        const nCtx = nCanvas.getContext('2d');

        const COLORS = [null, '#00f2ff', '#ffb800', '#3d5afe', '#ffeb3b', '#a855f7', '#4ade80', '#f43f5e'];
        const PIECES = 'ILJOTSZ';

        let board = createMat(12, 20);
        let player = { pos: {x: 0, y: 0}, mat: null, next: null, score: 0 };
        let dropCount = 0;
        let dropInt = 1000;
        let lastTime = 0;
        let active = false;
        let paused = false;

        function createMat(w, h) {
            const m = [];
            while (h--) m.push(new Array(w).fill(0));
            return m;
        }

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'T') return [[0,5,0],[5,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
        }

        // 描画関連
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            drawMat(board, {x:0, y:0}, ctx, 20);
            drawMat(player.mat, player.pos, ctx, 20);
        }

        function drawMat(m, offset, targetCtx, scale) {
            if(!m) return;
            m.forEach((row, y) => {
                row.forEach((val, x) => {
                    if (val !== 0) {
                        targetCtx.fillStyle = COLORS[val];
                        targetCtx.fillRect((x + offset.x) * scale, (y + offset.y) * scale, scale, scale);
                        targetCtx.strokeStyle = 'rgba(255,255,255,0.2)';
                        targetCtx.strokeRect((x + offset.x) * scale, (y + offset.y) * scale, scale, scale);
                    }
                });
            });
        }

        function drawNext() {
            // NEXTキャンバスのクリア（スケールに依存しない方法）
            nCtx.fillStyle = '#000';
            nCtx.fillRect(0, 0, nCanvas.width, nCanvas.height);
            
            if (player.next) {
                // 中央寄席の計算
                const s = 15; // NEXT用のスケール
                const ox = (nCanvas.width / s - player.next[0].length) / 2;
                const oy = (nCanvas.height / s - player.next.length) / 2;
                drawMat(player.next, {x: ox, y: oy}, nCtx, s);
            }
        }

        // ロジック関連
        function collide(b, p) {
            const [m, o] = [p.mat, p.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (b[y + o.y] && b[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(b, p) {
            p.mat.forEach((row, y) => {
                row.forEach((val, x) => {
                    if (val !== 0) b[y + p.pos.y][x + p.pos.x] = val;
                });
            });
        }

        function sweep() {
            let rowCount = 1;
            outer: for (let y = board.length - 1; y > 0; --y) {
                for (let x = 0; x < board[y].length; ++x) {
                    if (board[y][x] === 0) continue outer;
                }
                const row = board.splice(y, 1)[0].fill(0);
                board.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
                dropInt = Math.max(100, 1000 - (player.score / 2));
            }
            document.getElementById('score-val').innerText = player.score;
        }

        function rotate(m) {
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < y; ++x) [m[x][y], m[y][x]] = [m[y][x], m[x][y]];
            }
            m.forEach(row => row.reverse());
        }

        function pRotate() {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.mat);
            while (collide(board, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.mat[0].length) {
                    rotate(player.mat); // 戻す
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function pDrop() {
            player.pos.y++;
            if (collide(board, player)) {
                player.pos.y--;
                merge(board, player);
                pReset();
                sweep();
            }
            dropCount = 0;
        }

        function pHardDrop() {
            while (!collide(board, player)) player.pos.y++;
            player.pos.y--;
            merge(board, player);
            pReset();
            sweep();
        }

        function pMove(d) {
            player.pos.x += d;
            if (collide(board, player)) player.pos.x -= d;
        }

        function pReset() {
            if (!player.next) player.next = createPiece(PIECES[Math.random() * PIECES.length | 0]);
            player.mat = player.next;
            player.next = createPiece(PIECES[Math.random() * PIECES.length | 0]);
            player.pos.y = 0;
            player.pos.x = (board[0].length / 2 | 0) - (player.mat[0].length / 2 | 0);
            
            drawNext();

            if (collide(board, player)) {
                active = false;
                document.getElementById('msg-overlay').style.display = 'flex';
                document.getElementById('final-score').innerText = "Score: " + player.score;
            }
        }

        function pauseGame() {
            if(!active) return;
            paused = !paused;
            document.getElementById('pause-btn').innerText = paused ? "RESUME" : "PAUSE";
            if(!paused) { lastTime = performance.now(); update(); }
        }

        function initGame() {
            board = createMat(12, 20);
            player.score = 0;
            player.next = null;
            dropInt = 1000;
            document.getElementById('score-val').innerText = "0";
            document.getElementById('msg-overlay').style.display = 'none';
            paused = false;
            active = true;
            pReset();
            lastTime = performance.now();
            update();
        }

        function update(time = 0) {
            if (!active || paused) return;
            const dt = time - lastTime;
            lastTime = time;
            dropCount += dt;
            if (dropCount > dropInt) pDrop();
            draw();
            requestAnimationFrame(update);
        }

        // 入力処理
        document.addEventListener('keydown', e => {
            if (!active || paused) return;
            if (e.keyCode === 37) pMove(-1);
            if (e.keyCode === 39) pMove(1);
            if (e.keyCode === 40) pDrop();
            if (e.keyCode === 38) pRotate();
            if (e.keyCode === 32) pHardDrop();
        });

        const bind = (id, fn) => {
            const el = document.getElementById(id);
            const call = (e) => { e.preventDefault(); if(active && !paused) fn(); };
            el.addEventListener('touchstart', call);
            el.addEventListener('mousedown', call);
        };
        bind('m-left', () => pMove(-1));
        bind('m-right', () => pMove(1));
        bind('m-down', () => pDrop());
        bind('m-rot', () => pRotate());
        bind('m-drop', () => pHardDrop());

    </script>
</body>
</html>
