<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tetris Pro Tablet Edition</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --accent-color: #00f2ff;
            --btn-size: 75px;
        }

        body {
            background: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none; /* 全体のスクロールを禁止 */
        }

        /* ゲームメインエリア */
        .game-wrapper {
            position: relative;
            display: flex;
            gap: 15px;
            padding: 15px;
            background: var(--panel-bg);
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        canvas#tetris {
            border: 2px solid #444;
            background-color: #000;
            border-radius: 4px;
        }

        /* サイドパネル */
        .ui-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 90px;
        }

        .info-box {
            background: #2a2a2a;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #3d3d3d;
        }

        .info-label { font-size: 10px; color: #888; letter-spacing: 1px; }
        .info-value { font-size: 18px; font-weight: bold; color: var(--accent-color); }

        .menu-btn {
            padding: 12px 5px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        #start-btn { background: var(--accent-color); color: #000; }
        #pause-btn { background: #ffae00; color: #000; }

        /* ゲームオーバー表示 */
        #game-over-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            border-radius: 15px;
        }

        /* --- 改良版コントローラー --- */
        .controller-area {
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
            display: flex;
            justify-content: space-between; /* 左右に分ける */
            padding: 0 20px;
            box-sizing: border-box;
        }

        .d-pad, .action-pad {
            display: grid;
            gap: 10px;
        }

        /* 左側：移動キー（十字キー風） */
        .d-pad {
            grid-template-columns: repeat(3, var(--btn-size));
            grid-template-rows: repeat(2, var(--btn-size));
        }

        /* 右側：回転とハードドロップ */
        .action-pad {
            grid-template-columns: repeat(2, var(--btn-size));
            grid-template-rows: repeat(2, var(--btn-size));
        }

        .btn {
            background: #333;
            border: 2px solid #444;
            border-radius: 50%; /* 丸ボタンで指の当たりを良くする */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: white;
            user-select: none;
            touch-action: none;
            box-shadow: 0 4px 0 #1a1a1a;
        }

        .btn:active {
            background: #555;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a1a1a;
        }

        /* 特殊ボタンの色分け */
        .btn-rotate { background: #444; border-color: var(--accent-color); color: var(--accent-color); grid-column: 2; grid-row: 1; }
        .btn-drop { background: #442222; border-color: #ff4444; color: #ff4444; grid-column: 2; grid-row: 2; font-size: 16px; font-weight: bold; }

        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }

    </style>
</head>
<body>

    <div class="game-wrapper">
        <div id="game-over-overlay">
            <h1 style="color:#ff4444; margin:0;">GAME OVER</h1>
            <p>SCORE: <span id="final-score">0</span></p>
            <button class="menu-btn" onclick="startGame()" style="background:#fff; width:100px;">RETRY</button>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>
        
        <div class="ui-panel">
            <div class="info-box">
                <div class="info-label">SCORE</div>
                <div id="score" class="info-value">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">NEXT</div>
                <canvas id="next" width="80" height="80"></canvas>
            </div>
            <button id="start-btn" class="menu-btn" onclick="startGame()">START</button>
            <button id="pause-btn" class="menu-btn" onclick="togglePause()">PAUSE</button>
        </div>
    </div>

    <div class="controller-area">
        <div class="d-pad">
            <div class="btn btn-left" id="ctrl-left">←</div>
            <div class="btn btn-down" id="ctrl-down">↓</div>
            <div class="btn btn-right" id="ctrl-right">→</div>
        </div>

        <div class="action-pad">
            <div class="btn btn-rotate" id="ctrl-up">↻</div>
            <div class="btn btn-drop" id="ctrl-hard">DROP</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextContext = nextCanvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const overlay = document.getElementById('game-over-overlay');

        context.scale(20, 20);
        nextContext.scale(20, 20);

        const pieces = 'ILJOTSZ';
        const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];

        let arena = createMatrix(12, 20);
        let player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0 };
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isRunning = false;
        let isPaused = false;

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'T') return [[0,5,0],[5,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
        }

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function draw() {
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'rgba(255,255,255,0.3)';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
                // スコアに応じて少しずつ加速
                dropInterval = Math.max(100, 1000 - (player.score / 2));
            }
            updateScore();
        }

        function playerDrop() {
            if(isPaused) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            if(isPaused || !isRunning) return;
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            dropCounter = 0;
        }

        function playerMove(dir) {
            if(isPaused) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function playerRotate(dir) {
            if(isPaused) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function playerReset() {
            if (player.next === null) player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            drawNext();

            if (collide(arena, player)) {
                gameOver();
            }
        }

        function drawNext() {
            nextContext.fillStyle = '#2a2a2a';
            nextContext.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            player.next.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        nextContext.fillStyle = colors[value];
                        nextContext.fillRect(x + 1, y + 1, 1, 1);
                        nextContext.strokeRect(x + 1, y + 1, 1, 1);
                    }
                });
            });
        }

        function updateScore() {
            scoreElement.innerText = player.score;
        }

        function gameOver() {
            isRunning = false;
            overlay.style.display = 'flex';
            document.getElementById('final-score').innerText = player.score;
        }

        function togglePause() {
            if (!isRunning) return;
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "RESUME" : "PAUSE";
            if (!isPaused) {
                lastTime = performance.now();
                update();
            }
        }

        function startGame() {
            arena = createMatrix(12, 20);
            player.score = 0;
            player.next = null;
            dropInterval = 1000;
            updateScore();
            overlay.style.display = 'none';
            isPaused = false;
            document.getElementById('pause-btn').innerText = "PAUSE";
            
            if (!isRunning) {
                isRunning = true;
                playerReset();
                lastTime = performance.now();
                update();
            } else {
                playerReset();
            }
        }

        function update(time = 0) {
            if(!isRunning || isPaused) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        // --- 入力制御 (PC & Touch) ---
        document.addEventListener('keydown', e => {
            if (e.keyCode === 37) playerMove(-1);
            else if (e.keyCode === 39) playerMove(1);
            else if (e.keyCode === 40) playerDrop();
            else if (e.keyCode === 38) playerRotate(1);
            else if (e.keyCode === 32) playerHardDrop(); // スペースでハードドロップ
        });

        const setupBtn = (id, action) => {
            const el = document.getElementById(id);
            const trigger = (e) => { 
                e.preventDefault(); 
                if(isRunning && !isPaused) action(); 
            };
            el.addEventListener('touchstart', trigger, {passive: false});
            el.addEventListener('mousedown', trigger);
        };

        setupBtn('ctrl-left', () => playerMove(-1));
        setupBtn('ctrl-right', () => playerMove(1));
        setupBtn('ctrl-down', () => playerDrop());
        setupBtn('ctrl-up', () => playerRotate(1));
        setupBtn('ctrl-hard', () => playerHardDrop());

    </script>
</body>
</html>
