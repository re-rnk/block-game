<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Performance Tetris Professional</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent: #38bdf8;
            --danger: #f43f5e;
            --btn-size: 70px;
        }

        body {
            background-color: var(--bg-color);
            color: #f8fafc;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        /* メインコンテナ */
        .game-container {
            position: relative;
            display: flex;
            gap: 20px;
            padding: 20px;
            background: var(--panel-bg);
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* メインキャンバス */
        #tetris {
            border: 3px solid #334155;
            background: #000;
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }

        /* 右側UIパネル */
        .side-bar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100px;
        }

        .stat-card {
            background: #0f172a;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            border: 1px solid #334155;
        }

        .label { font-size: 11px; color: #94a3b8; font-weight: bold; margin-bottom: 5px; }
        .value { font-size: 20px; font-weight: 800; color: var(--accent); }

        /* NEXTプレビュー */
        #next {
            background: #000;
            border: 2px solid #334155;
            border-radius: 4px;
            margin-top: 5px;
        }

        .btn-menu {
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        #start-btn { background: var(--accent); color: #0f172a; }
        #pause-btn { background: #475569; color: white; }
        .btn-menu:active { transform: scale(0.95); opacity: 0.8; }

        /* ゲームオーバー画面 */
        #overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 16px;
        }

        /* コントローラー（左右分割） */
        .controller {
            width: 100%;
            max-width: 600px;
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            padding: 0 15px;
            box-sizing: border-box;
        }

        .pad-group { display: grid; gap: 12px; }
        .left-pad { grid-template-columns: repeat(3, var(--btn-size)); }
        .right-pad { grid-template-columns: repeat(2, var(--btn-size)); }

        .btn-touch {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 50%;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            user-select: none;
            height: var(--btn-size);
            width: var(--btn-size);
            box-shadow: 0 4px 0 #0f172a;
        }

        .btn-touch:active {
            background: #334155;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0f172a;
        }

        .btn-rotate { border-color: var(--accent); color: var(--accent); }
        .btn-drop { border-color: var(--danger); color: var(--danger); font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="overlay">
            <h1 style="color:var(--danger); margin-bottom:0;">GAME OVER</h1>
            <p id="final-score-display" style="font-size:24px; font-weight:bold; margin:10px 0;">0</p>
            <button class="btn-menu" onclick="resetGame()" style="background:white; color:black; width:120px;">RETRY</button>
        </div>

        <canvas id="tetris" width="240" height="400"></canvas>

        <div class="side-bar">
            <div class="stat-card">
                <div class="label">SCORE</div>
                <div id="score" class="value">0</div>
            </div>
            <div class="stat-card">
                <div class="label">NEXT</div>
                <canvas id="next" width="80" height="80"></canvas>
            </div>
            <button id="start-btn" class="btn-menu" onclick="resetGame()">START</button>
            <button id="pause-btn" class="btn-menu" onclick="togglePause()">PAUSE</button>
        </div>
    </div>

    <div class="controller">
        <div class="pad-group left-pad">
            <div class="btn-touch" id="move-left" style="grid-column:1; grid-row:1;">←</div>
            <div class="btn-touch" id="move-down" style="grid-column:2; grid-row:1;">↓</div>
            <div class="btn-touch" id="move-right" style="grid-column:3; grid-row:1;">→</div>
        </div>
        <div class="pad-group right-pad">
            <div class="btn-touch btn-rotate" id="rotate-up">↻</div>
            <div class="btn-touch btn-drop" id="hard-drop">DROP</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextCtx = nextCanvas.getContext('2d');

        context.scale(20, 20);
        nextCtx.scale(20, 20);

        // ミノのデザイン
        const colors = [
            null,
            '#00f2ff', // I
            '#ffb800', // L
            '#3d5afe', // J
            '#ffeb3b', // O
            '#a855f7', // T
            '#4ade80', // S
            '#f43f5e', // Z
        ];

        function createPiece(type) {
            if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
            if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
            if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
            if (type === 'O') return [[4,4],[4,4]];
            if (type === 'T') return [[0,5,0],[5,5,5],[0,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
        }

        // 基本変数
        let arena = createMatrix(12, 20);
        let player = { pos: {x: 0, y: 0}, matrix: null, next: null, score: 0 };
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let isRunning = false;
        let isPaused = false;

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        // 描画ロジック
        function draw() {
            // 背景クリア
            context.fillStyle = '#000';
            context.fillRect(0, 0, canvas.width, canvas.height);
            
            drawMatrix(arena, {x: 0, y: 0}, context);
            drawMatrix(player.matrix, player.pos, context);
        }

        function drawMatrix(matrix, offset, ctx) {
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        ctx.fillStyle = colors[value];
                        ctx.fillRect(x + offset.x, y + offset.y, 1, 1);
                        // 立体感の枠
                        ctx.lineWidth = 0.05;
                        ctx.strokeStyle = 'white';
                        ctx.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function drawNext() {
            nextCtx.fillStyle = '#000';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            
            // NEXTミノを中央に寄せて描画
            if (player.next) {
                const matrix = player.next;
                // 4x4の枠内で中央寄せ
                const xOffset = (4 - matrix[0].length) / 2;
                const yOffset = (4 - matrix.length) / 2;
                drawMatrix(matrix, {x: xOffset, y: yOffset}, nextCtx);
            }
        }

        // 衝突・消去
        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
                dropInterval = Math.max(100, 1000 - (player.score / 2));
            }
            document.getElementById('score').innerText = player.score;
        }

        // 移動・回転
        function playerDrop() {
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                playerReset();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerHardDrop() {
            while (!collide(arena, player)) {
                player.pos.y++;
            }
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }

        function playerMove(dir) {
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir;
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
            if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
        }

        function playerRotate(dir) {
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            if (player.next === null) {
                player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            }
            player.matrix = player.next;
            player.next = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            drawNext(); // NEXTを更新

            if (collide(arena, player)) {
                isRunning = false;
                document.getElementById('overlay').style.display = 'flex';
                document.getElementById('final-score-display').innerText = "FINAL SCORE: " + player.score;
            }
        }

        function togglePause() {
            if (!isRunning) return;
            isPaused = !isPaused;
            document.getElementById('pause-btn').innerText = isPaused ? "RESUME" : "PAUSE";
            if (!isPaused) { lastTime = performance.now(); update(); }
        }

        function resetGame() {
            arena = createMatrix(12, 20);
            player.score = 0;
            player.next = null;
            dropInterval = 1000;
            document.getElementById('score').innerText = "0";
            document.getElementById('overlay').style.display = 'none';
            isPaused = false;
            isRunning = true;
            playerReset();
            lastTime = performance.now();
            update();
        }

        function update(time = 0) {
            if (!isRunning || isPaused) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        // 入力
        document.addEventListener('keydown', e => {
            if (e.keyCode === 37) playerMove(-1);
            if (e.keyCode === 39) playerMove(1);
            if (e.keyCode === 40) playerDrop();
            if (e.keyCode === 38) playerRotate(1);
            if (e.keyCode === 32) playerHardDrop();
        });

        const bindBtn = (id, fn) => {
            const el = document.getElementById(id);
            el.addEventListener('touchstart', (e) => { e.preventDefault(); if(isRunning && !isPaused) fn(); });
            el.addEventListener('mousedown', (e) => { if(isRunning && !isPaused) fn(); });
        }
        bindBtn('move-left', () => playerMove(-1));
        bindBtn('move-right', () => playerMove(1));
        bindBtn('move-down', () => playerDrop());
        bindBtn('rotate-up', () => playerRotate(1));
        bindBtn('hard-drop', () => playerHardDrop());

    </script>
</body>
</html>
